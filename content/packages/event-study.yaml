slug: event-study
skill: packages
section: Graphics and Diagnostics
title: Event Study Packages in Stata
trigger: Use when the user asks about eventstudyinteract or a related community-package workflow.
commands:
- eventstudyinteract
source_topics:
- eventstudyinteract
syntax_patterns: []
gotchas:
- Package syntax and dependencies vary across versions; verify the installed help file before finalizing
  code.
workflows:
- Confirm the package and any dependencies are installed on the active adopath before writing code that
  uses it.
- Pair the package command with a small reproducible example before folding it into a larger do-file.
validation_case: Run a small batch-mode example that exercises eventstudyinteract and inspect the resulting
  log.
related_refs:
- difference-in-differences
- graphics
install_commands:
- net install require, from("https://raw.githubusercontent.com/sergiocorreia/stata-require/master/src/")
  replace
- net install ftools, from("https://raw.githubusercontent.com/sergiocorreia/ftools/master/src/")
  replace
- ftools, compile
- 'mata: mata mlib index'
- net install reghdfe, from("https://raw.githubusercontent.com/sergiocorreia/reghdfe/master/src/")
  replace
- capture noisily reghdfe, compile
- ssc install avar, replace
- ssc install eventstudyinteract, replace
smoke_test: |
  webuse nlswork, clear
  keep if inrange(year, 70, 82)
  gen union_year = year if union == 1
  bysort idcode: egen first_union = min(union_year)
  drop union_year
  gen ry = year - first_union
  gen never_union = first_union == .
  forvalues k = 3(-1)2 {
      gen g_`k' = ry == -`k'
  }
  gen g0 = ry == 0
  forvalues k = 1/2 {
      gen g`k' = ry == `k'
  }
  eventstudyinteract ln_wage g_3 g_2 g0 g1 g2, cohort(first_union) control_cohort(never_union) covariates(south) absorb(idcode year) vce(cluster idcode)
provenance:
  local_help_topics:
  - eventstudyinteract
  local_help_files: []
  upstream_files:
  - plugins/stata/skills/stata/packages/event-study.md
  upstream_only: true
