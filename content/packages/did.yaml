slug: did
skill: packages
section: Estimation Packages
title: Modern Difference-in-Differences Packages in Stata
trigger: Use when the user asks about csdid or a related community-package workflow.
commands:
- csdid
source_topics:
- csdid
syntax_patterns: []
gotchas:
- Package syntax and dependencies vary across versions; verify the installed help file before finalizing
  code.
workflows:
- Confirm the package and any dependencies are installed on the active adopath before writing code that
  uses it.
- Pair the package command with a small reproducible example before folding it into a larger do-file.
validation_case: Run a small batch-mode example that exercises csdid and inspect the resulting log.
related_refs:
- difference-in-differences
- treatment-effects
install_commands:
- ssc install csdid, replace
smoke_test: 'clear

  set obs 80

  gen id = ceil(_n/4)

  gen t = mod(_n-1,4)

  gen gvar = cond(id <= 10, 2, 0)

  gen y = rnormal() + 2*(gvar>0 & t>=gvar)

  csdid y, ivar(id) time(t) gvar(gvar) notyet'
