  install_commands:
  - net install require, from("https://raw.githubusercontent.com/sergiocorreia/stata-require/master/src/")
    replace
  - net install ftools, from("https://raw.githubusercontent.com/sergiocorreia/ftools/master/src/") replace
  - ftools, compile
  - 'mata: mata mlib index'
  - net install reghdfe, from("https://raw.githubusercontent.com/sergiocorreia/reghdfe/master/src/") replace
  - capture noisily reghdfe, compile
  - ssc install avar, replace
  - ssc install eventstudyinteract, replace
  smoke_test: "webuse nlswork, clear\nkeep if inrange(year, 70, 82)\ngen union_year = year if union ==\
    \ 1\nbysort idcode: egen first_union = min(union_year)\ndrop union_year\ngen ry = year - first_union\n\
    gen never_union = first_union == .\nforvalues k = 3(-1)2 {\n    gen g_`k' = ry == -`k'\n}\ngen g0\
    \ = ry == 0\nforvalues k = 1/2 {\n    gen g`k' = ry == `k'\n}\neventstudyinteract ln_wage g_3 g_2\
    \ g0 g1 g2, cohort(first_union) control_cohort(never_union) covariates(south) absorb(idcode year)\
    \ vce(cluster idcode)"
